<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Absensi SMK Assyafiiyah</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --green-dark:   #0d3b1e;
      --green-mid:    #145a2e;
      --green-main:   #1e8045;
      --green-light:  #2db560;
      --green-pale:   #d4f0de;
      --green-glow:   #3ddc84;
      --gold:         #f4c842;
      --white:        #f9fdf9;
      --text:         #0d3b1e;
      --text-muted:   #4a7a5a;
      --surface:      #ffffff;
      --radius:       16px;
      --shadow:       0 8px 32px rgba(13,59,30,0.13);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: linear-gradient(135deg, #0d3b1e 0%, #1a5c30 40%, #0f4422 100%);
      min-height: 100vh;
      padding: 30px 16px 60px;
      position: relative;
      overflow-x: hidden;
    }

    /* decorative circles */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
    }
    body::before {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(61,220,132,0.10) 0%, transparent 70%);
      top: -150px; right: -150px;
    }
    body::after {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(244,200,66,0.07) 0%, transparent 70%);
      bottom: -100px; left: -100px;
    }

    /* ──────── CARD ──────── */
    .card {
      max-width: 640px;
      margin: 0 auto;
      background: var(--surface);
      border-radius: 24px;
      box-shadow: var(--shadow), 0 0 0 1px rgba(61,220,132,0.12);
      overflow: hidden;
      position: relative;
    }

    /* ──────── HEADER ──────── */
    .header {
      background: linear-gradient(135deg, #0d3b1e 0%, #1e8045 100%);
      padding: 36px 36px 28px;
      position: relative;
      overflow: hidden;
    }
    .header::after {
      content: '';
      position: absolute;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 16px;
      position: relative; z-index: 1;
    }
    .logo-circle {
      width: 60px; height: 60px;
      background: linear-gradient(135deg, var(--gold), #e8a800);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      box-shadow: 0 4px 16px rgba(244,200,66,0.4);
      flex-shrink: 0;
    }
    .school-name {
      color: #fff;
      font-family: 'Playfair Display', serif;
      font-size: 1.45rem;
      line-height: 1.2;
    }
    .school-name span {
      display: block;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.72rem;
      font-weight: 500;
      color: rgba(255,255,255,0.65);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .header-title {
      position: relative; z-index: 1;
      color: #fff;
    }
    .header-title h1 {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.15;
    }
    .header-title h1 em {
      font-style: normal;
      color: var(--gold);
    }
    .teacher-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 10px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 999px;
      padding: 5px 14px;
      font-size: 0.82rem;
      font-weight: 600;
      color: rgba(255,255,255,0.9);
      backdrop-filter: blur(4px);
    }
    .teacher-badge::before { content: '👨‍🏫'; font-size: 14px; }

    /* ──────── BODY ──────── */
    .form-body {
      padding: 32px 36px 36px;
    }

    .form-group { margin-bottom: 22px; }
    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--green-mid);
      margin-bottom: 8px;
    }
    label .req { color: #e05252; margin-left: 2px; }

    input[type="text"],
    input[type="date"],
    select {
      width: 100%;
      padding: 13px 16px;
      border: 2px solid #d8ede2;
      border-radius: var(--radius);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text);
      background: #f6fdf8;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
    }
    input[type="text"]:focus,
    input[type="date"]:focus,
    select:focus {
      border-color: var(--green-main);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(30,128,69,0.12);
    }

    /* Select arrow */
    .select-wrap { position: relative; }
    .select-wrap::after {
      content: '▾';
      position: absolute;
      right: 16px; top: 50%;
      transform: translateY(-50%);
      color: var(--green-main);
      font-size: 1rem;
      pointer-events: none;
    }

    /* Row grid */
    .row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    @media (max-width: 480px) { .row-2 { grid-template-columns: 1fr; } }

    /* ──────── STATUS RADIO ──────── */
    .status-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }
    @media (max-width: 420px) { .status-grid { grid-template-columns: 1fr 1fr; } }

    .status-option { position: relative; }
    .status-option input[type="radio"] { position: absolute; opacity: 0; width: 0; height: 0; }
    .status-label {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      padding: 12px 8px;
      border: 2px solid #d8ede2;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
      background: #f6fdf8;
    }
    .status-label .ico { font-size: 1.4rem; }
    .status-label .lbl {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
    }
    .status-option input:checked + .status-label {
      border-color: var(--green-main);
      background: var(--green-pale);
      box-shadow: 0 0 0 3px rgba(30,128,69,0.12);
    }
    .status-option input:checked + .status-label .lbl { color: var(--green-dark); }

    /* ──────── SELFIE UPLOAD ──────── */
    .selfie-section {
      background: linear-gradient(135deg, #f0faf4, #e6f7ec);
      border: 2px dashed #6dcc95;
      border-radius: var(--radius);
      padding: 24px;
      text-align: center;
      transition: border-color 0.2s, background 0.2s;
      cursor: pointer;
      position: relative;
    }
    .selfie-section:hover { border-color: var(--green-main); background: #e6f7ec; }
    .selfie-section input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%;
    }
    .selfie-icon { font-size: 2.4rem; margin-bottom: 8px; }
    .selfie-section p {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--green-mid);
    }
    .selfie-section p small {
      display: block;
      font-weight: 400;
      color: var(--text-muted);
      margin-top: 3px;
      font-size: 0.76rem;
    }
    #preview-wrap {
      margin-top: 14px;
      display: none;
      position: relative;
    }
    #preview-wrap img {
      width: 100%;
      max-height: 220px;
      object-fit: cover;
      border-radius: 12px;
      border: 3px solid var(--green-main);
    }
    #remove-img {
      position: absolute;
      top: 8px; right: 8px;
      background: rgba(0,0,0,0.55);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 28px; height: 28px;
      font-size: 14px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }

    /* ──────── NOTICE XPPLG ──────── */
    .notice {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      background: #fff8e1;
      border-left: 4px solid var(--gold);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 0.82rem;
      color: #7a5800;
      font-weight: 500;
      margin-bottom: 22px;
    }
    .notice .ico { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }

    /* ──────── SUBMIT BUTTON ──────── */
    .btn-submit {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #1e8045, #2db560);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 6px 20px rgba(30,128,69,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 8px;
    }
    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(30,128,69,0.45);
    }
    .btn-submit:active { transform: translateY(0); }
    .btn-submit:disabled {
      background: #a0c8b0;
      box-shadow: none;
      cursor: not-allowed;
      transform: none;
    }

    /* ──────── TOAST ──────── */
    #toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #0d3b1e;
      color: #fff;
      padding: 14px 28px;
      border-radius: 999px;
      font-size: 0.9rem;
      font-weight: 600;
      box-shadow: 0 8px 30px rgba(0,0,0,0.3);
      transition: transform 0.4s cubic-bezier(.34,1.56,.64,1), opacity 0.3s;
      opacity: 0;
      z-index: 9999;
      white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    #toast.error { background: #8b2020; }

    /* ──────── DIVIDER ──────── */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, #c8e8d4, transparent);
      margin: 26px 0;
    }

    /* ──────── LOADER ──────── */
    .spinner {
      width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="card">

  <!-- HEADER -->
  <div class="header">
    <div class="logo-row">
      <div class="logo-circle">🕌</div>
      <div class="school-name">
        SMK Assyafiiyah
        <span>Yayasan Pendidikan Islam</span>
      </div>
    </div>
    <div class="header-title">
      <h1>Daftar <em>Absensi</em></h1>
      <div class="teacher-badge">Guru: Riski Sistama</div>
    </div>
  </div>

  <!-- FORM -->
  <div class="form-body">
    <form id="absenForm" novalidate>

      <!-- Nama -->
      <div class="form-group">
        <label for="nama">Nama Lengkap <span class="req">*</span></label>
        <input type="text" id="nama" placeholder="Masukkan nama lengkap…" required autocomplete="name"/>
      </div>

      <!-- Kelas -->
      <div class="form-group">
        <label for="kelas">Kelas <span class="req">*</span></label>
        <div class="select-wrap">
          <select id="kelas" required>
            <option value="" disabled selected>— Pilih kelas —</option>
            <option value="X PPLG">X PPLG</option>
            <option value="X AKL">X AKL</option>
            <option value="XI RPL">XI RPL</option>
          </select>
        </div>
      </div>

      <!-- Hari & Tanggal -->
      <div class="row-2">
        <div class="form-group">
          <label for="hari">Hari <span class="req">*</span></label>
          <div class="select-wrap">
            <select id="hari" required>
              <option value="" disabled selected>— Pilih hari —</option>
              <option>Senin</option><option>Selasa</option><option>Rabu</option>
              <option>Kamis</option><option>Jumat</option><option>Sabtu</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label for="tanggal">Tanggal <span class="req">*</span></label>
          <input type="date" id="tanggal" required/>
        </div>
      </div>

      <!-- Status kehadiran -->
      <div class="form-group">
        <label>Status Kehadiran <span class="req">*</span></label>
        <div class="status-grid">
          <div class="status-option">
            <input type="radio" name="status" id="hadir" value="Hadir" required/>
            <label class="status-label" for="hadir">
              <span class="ico">✅</span>
              <span class="lbl">Hadir</span>
            </label>
          </div>
          <div class="status-option">
            <input type="radio" name="status" id="izin" value="Izin"/>
            <label class="status-label" for="izin">
              <span class="ico">📋</span>
              <span class="lbl">Izin</span>
            </label>
          </div>
          <div class="status-option">
            <input type="radio" name="status" id="sakit" value="Sakit"/>
            <label class="status-label" for="sakit">
              <span class="ico">🏥</span>
              <span class="lbl">Sakit</span>
            </label>
          </div>
          <div class="status-option">
            <input type="radio" name="status" id="alpha" value="Alpha"/>
            <label class="status-label" for="alpha">
              <span class="ico">❌</span>
              <span class="lbl">Alpha</span>
            </label>
          </div>
        </div>
      </div>

      <div class="divider"></div>

      <!-- SELFIE SECTION (tampil hanya untuk X PPLG) -->
      <div id="selfieSection" style="display:none;">
        <div class="notice">
          <span class="ico">📸</span>
          Upload foto selfie <strong>wajib</strong> untuk siswa kelas X PPLG. Foto akan tersimpan otomatis ke Google Drive Guru.
        </div>
        <div class="form-group">
          <label for="selfie">Foto Selfie <span class="req">*</span></label>
          <div class="selfie-section" id="selfieBox">
            <input type="file" id="selfie" name="selfie" accept="image/*" capture="user"/>
            <div class="selfie-icon">🤳</div>
            <p>Klik atau foto langsung dari kamera
              <small>Format JPG / PNG · Maks. 5 MB</small>
            </p>
          </div>
          <div id="preview-wrap">
            <img id="preview-img" src="" alt="Preview selfie"/>
            <button type="button" id="remove-img">✕</button>
          </div>
        </div>
        <div class="divider"></div>
      </div>

      <!-- SUBMIT -->
      <button type="submit" class="btn-submit" id="submitBtn">
        <span id="btnText">📤 Kirim Absensi</span>
        <div class="spinner" id="btnSpinner"></div>
      </button>

    </form>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
  // ══════════════════════════════════════════════════
  //  ⚙️  KONFIGURASI — Isi sebelum deploy
  // ══════════════════════════════════════════════════

  /**
   * 1. Buka Google Apps Script → buat Web App baru
   *    Paste script Apps Script di bawah ke sana,
   *    lalu deploy sebagai Web App (Execute as: Me, Access: Anyone).
   *    Salin URL deployment-nya ke sini.
   */
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/GANTI_DENGAN_URL_APPS_SCRIPT_ANDA/exec';

  /**
   * 2. ID folder Google Drive tempat foto selfie disimpan.
   *    Buka folder Drive → salin ID dari URL:
   *    drive.google.com/drive/folders/[FOLDER_ID_INI]
   */
  const DRIVE_FOLDER_ID = 'GANTI_DENGAN_FOLDER_ID_DRIVE_ANDA';

  // ══════════════════════════════════════════════════

  // Isi tanggal & hari otomatis
  const today = new Date();
  document.getElementById('tanggal').value = today.toISOString().split('T')[0];
  const hariList = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
  const hariSel = document.getElementById('hari');
  const hariOpts = hariSel.options;
  const todayHari = hariList[today.getDay()];
  for (let o of hariOpts) { if (o.value === todayHari) { o.selected = true; break; } }

  // Tampilkan/sembunyikan section selfie berdasarkan kelas
  document.getElementById('kelas').addEventListener('change', function() {
    const ss = document.getElementById('selfieSection');
    if (this.value === 'X PPLG') {
      ss.style.display = 'block';
      ss.style.animation = 'none';
      ss.offsetHeight;
    } else {
      ss.style.display = 'none';
      document.getElementById('selfie').value = '';
      document.getElementById('preview-wrap').style.display = 'none';
    }
  });

  // Preview foto
  document.getElementById('selfie').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 5 * 1024 * 1024) { showToast('❌ Ukuran foto maks. 5 MB', true); this.value = ''; return; }
    const reader = new FileReader();
    reader.onload = r => {
      document.getElementById('preview-img').src = r.target.result;
      document.getElementById('preview-wrap').style.display = 'block';
    };
    reader.readAsDataURL(file);
  });

  document.getElementById('remove-img').addEventListener('click', () => {
    document.getElementById('selfie').value = '';
    document.getElementById('preview-wrap').style.display = 'none';
  });

  // ── SUBMIT ──
  document.getElementById('absenForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const nama    = document.getElementById('nama').value.trim();
    const kelas   = document.getElementById('kelas').value;
    const hari    = document.getElementById('hari').value;
    const tanggal = document.getElementById('tanggal').value;
    const status  = document.querySelector('input[name="status"]:checked')?.value;
    const selfie  = document.getElementById('selfie').files[0];

    // Validasi
    if (!nama)    return showToast('⚠️ Nama wajib diisi', true);
    if (!kelas)   return showToast('⚠️ Pilih kelas terlebih dahulu', true);
    if (!hari)    return showToast('⚠️ Pilih hari terlebih dahulu', true);
    if (!tanggal) return showToast('⚠️ Pilih tanggal terlebih dahulu', true);
    if (!status)  return showToast('⚠️ Pilih status kehadiran', true);
    if (kelas === 'X PPLG' && !selfie) return showToast('⚠️ Foto selfie wajib untuk X PPLG', true);

    setLoading(true);

    try {
      let photoUrl = '';

      // Upload foto ke Drive (via Apps Script) jika ada
      if (selfie) {
        const base64 = await toBase64(selfie);
        const uploadRes = await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            action: 'uploadPhoto',
            fileName: `selfie_${nama.replace(/\s+/g,'_')}_${tanggal}.jpg`,
            mimeType: selfie.type,
            base64Data: base64.split(',')[1],
            folderId: DRIVE_FOLDER_ID
          })
        });
        const uploadData = await uploadRes.json();
        if (uploadData.status === 'success') {
          photoUrl = uploadData.url;
        } else {
          throw new Error('Gagal upload foto: ' + (uploadData.message || ''));
        }
      }

      // Kirim data absensi ke Spreadsheet
      const payload = {
        action: 'addAbsensi',
        nama, kelas, hari, tanggal, status,
        photoUrl,
        guru: 'Riski Sistama',
        timestamp: new Date().toLocaleString('id-ID')
      };

      const res = await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const data = await res.json();

      if (data.status === 'success') {
        showToast('✅ Absensi berhasil dikirim!');
        resetForm();
      } else {
        throw new Error(data.message || 'Respons tidak dikenal');
      }

    } catch (err) {
      console.error(err);
      showToast('❌ Gagal: ' + err.message, true);
    } finally {
      setLoading(false);
    }
  });

  function toBase64(file) {
    return new Promise((res, rej) => {
      const r = new FileReader();
      r.onload  = () => res(r.result);
      r.onerror = () => rej(new Error('Gagal membaca file'));
      r.readAsDataURL(file);
    });
  }

  function setLoading(on) {
    const btn = document.getElementById('submitBtn');
    const txt = document.getElementById('btnText');
    const sp  = document.getElementById('btnSpinner');
    btn.disabled = on;
    txt.textContent = on ? 'Mengirim…' : '📤 Kirim Absensi';
    sp.style.display = on ? 'block' : 'none';
  }

  function resetForm() {
    document.getElementById('absenForm').reset();
    document.getElementById('preview-wrap').style.display = 'none';
    document.getElementById('selfieSection').style.display = 'none';
    // restore today's date & hari
    const t = new Date();
    document.getElementById('tanggal').value = t.toISOString().split('T')[0];
    const hh = hariSel.options;
    const th = hariList[t.getDay()];
    for (let o of hh) { if (o.value === th) { o.selected = true; break; } }
  }

  let toastTimer;
  function showToast(msg, isError = false) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = isError ? 'show error' : 'show';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { el.className = ''; }, 3500);
  }
</script>
